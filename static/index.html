<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rawform</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>rawform</h1>
    <p class="subtitle">Minimalist form builder — forms are created via API</p>
  </header>
  <main>
    <section class="card">
      <h2>Edit a form</h2>
      <p class="card-desc">Enter the admin token you received when creating the form via API.</p>
      <div class="open-row">
        <input id="admin-token-input" type="text" placeholder="Admin token" />
        <button id="open-builder-btn">Open editor ↗</button>
      </div>
    </section>

    <section class="card">
      <h2>View a form</h2>
      <p class="card-desc">Enter a submit token, or a client name + form ID.</p>
      <div class="open-row">
        <input id="submit-token-input" type="text" placeholder="Submit token" />
        <button id="open-form-token-btn">Open form ↗</button>
      </div>
      <div class="open-row" style="margin-top: 0.5rem">
        <input id="client-input" type="text" placeholder="Client name" style="max-width:160px" />
        <input id="id-input" type="text" placeholder="Form ID" style="max-width:160px" />
        <button id="open-form-id-btn">Open form ↗</button>
      </div>
    </section>
  </main>
  <script src="/index.js"></script>
</body>
</html>
