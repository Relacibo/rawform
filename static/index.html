<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rawform builder</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>rawform</h1>
    <p class="subtitle">Minimalist form builder</p>
  </header>

  <main>
    <!-- Connection -->
    <section id="connection">
      <div class="conn-fields">
        <label>Client <input id="client-name" type="text" placeholder="myapp" /></label>
        <label>Form ID <input id="external-id" type="text" placeholder="contact-form" /></label>
        <label>API Key <input id="api-key" type="password" placeholder="rawform_..." /></label>
      </div>
      <div class="conn-actions">
        <button id="load-btn">Load</button>
        <button id="save-btn">Save</button>
        <span id="save-status"></span>
      </div>
      <div id="token-display" hidden>
        <div class="token-row">
          <span class="token-label">Admin token</span>
          <code id="admin-token-val"></code>
          <button class="copy-btn" data-target="admin-token-val">Copy</button>
        </div>
        <div class="token-row">
          <span class="token-label">Submit token</span>
          <code id="submit-token-val"></code>
          <button class="copy-btn" data-target="submit-token-val">Copy</button>
        </div>
      </div>
    </section>

    <!-- Form meta -->
    <div id="form-meta">
      <label>Form title <input type="text" id="form-title" placeholder="Untitled form" /></label>
    </div>

    <!-- Builder -->
    <div id="builder"></div>

    <div id="add-element">
      <select id="element-type-select">
        <option value="">— Add element —</option>
        <option value="text">Text input</option>
        <option value="textarea">Textarea</option>
        <option value="dropdown">Dropdown</option>
        <option value="checkbox">Checkbox</option>
      </select>
      <button id="add-btn">Add</button>
    </div>

    <div id="actions">
      <button id="import-btn">Import JSON</button>
      <button id="export-btn">Export JSON</button>
      <button id="preview-btn">Preview</button>
    </div>

    <pre id="output"></pre>
  </main>

  <!-- Import dialog -->
  <dialog id="import-dialog">
    <h2>Import JSON</h2>
    <textarea id="import-textarea" placeholder='{ "title": "...", "elements": [...] }'></textarea>
    <p id="import-error" class="dialog-error"></p>
    <div class="dialog-actions">
      <button id="import-confirm-btn">Load</button>
      <button id="import-cancel-btn">Cancel</button>
    </div>
  </dialog>

  <!-- Preview dialog -->
  <dialog id="preview-dialog">
    <h2 id="preview-title">Preview</h2>
    <form id="preview-form" onsubmit="return false"></form>
    <div class="dialog-actions">
      <button id="preview-close-btn">Close</button>
    </div>
  </dialog>

  <script src="/builder.js"></script>
</body>
</html>
